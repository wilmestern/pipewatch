# Reaper configuration example
# Controls automatic removal of inactive sources from the checkpoint store.

reaper:
  # Maximum number of seconds a source may be inactive before it is reaped.
  # Sources whose last checkpoint is older than this threshold will be removed.
  max_inactivity_seconds: 3600  # 1 hour

  # When dry_run is true, stale sources are identified and logged but NOT removed.
  # Useful for auditing before enabling live reaping.
  dry_run: false

# Example schedule integration:
# Run the reaper as part of a periodic maintenance pass.
#
# scheduler:
#   poll_interval_seconds: 300
#
# sources:
#   - name: etl-daily
#     type: prometheus
