# example_suppressor_config.yaml
# Demonstrates how suppression windows can be expressed in configuration.
#
# Each window entry may specify:
#   source_name  - pipeline source to suppress (omit or null for all sources)
#   alert_name   - specific alert to suppress  (omit or null for all alerts)
#   days         - list of ISO weekday integers (0=Mon … 6=Sun); empty = every day
#   start_time   - HH:MM  (24-hour, UTC)
#   end_time     - HH:MM  (24-hour, UTC)

suppression_windows:

  # Suppress all alerts from the nightly ETL source between 01:00 and 05:00
  # every day (maintenance window).
  - source_name: nightly_etl
    alert_name: null
    days: []
    start_time: "01:00"
    end_time: "05:00"

  # Suppress the row_count alert on the reporting_db source every weekend.
  - source_name: reporting_db
    alert_name: row_count
    days: [5, 6]   # Saturday and Sunday
    start_time: "00:00"
    end_time: "23:59"

  # Suppress ALL alerts from ALL sources during a planned global maintenance
  # window on Monday mornings.
  - source_name: null
    alert_name: null
    days: [0]       : "02:00"
    end_time: "04:00"
